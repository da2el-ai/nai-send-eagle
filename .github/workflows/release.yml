name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: ZIP を作成
        run: zip -r NAISendEagle-${{ github.ref_name }}.zip NAISendEagle/

      - name: GitHub Release を作成して ZIP をアップロード
        uses: softprops/action-gh-release@v2
        with:
          files: NAISendEagle-${{ github.ref_name }}.zip
