<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NAI Send Eagle 設定</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 280px;
      padding: 16px;
      font-family: "Segoe UI", sans-serif;
      font-size: 13px;
      color: #333;
      background: #fff;
    }

    h1 {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 16px;
      color: #222;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 4px;
      font-weight: bold;
      color: #444;
    }

    input[type="text"] {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #4a90d9;
    }

    .checkbox-field {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .checkbox-field input[type="checkbox"] {
      width: 15px;
      height: 15px;
      cursor: pointer;
    }

    .checkbox-field label {
      margin: 0;
      font-weight: normal;
      cursor: pointer;
    }

    button {
      width: 100%;
      padding: 8px;
      background: #4a90d9;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
    }

    button:hover {
      background: #357abd;
    }

    #saveMessage {
      margin-top: 8px;
      text-align: center;
      font-size: 12px;
      color: #2a9d2a;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <h1>NAI Send Eagle 設定</h1>

  <div class="field">
    <label for="folderName">Eagle フォルダ名</label>
    <input
      type="text"
      id="folderName"
      placeholder="例: NovelAI（空白の場合はフォルダ未指定）"
    />
  </div>

  <div class="checkbox-field">
    <input type="checkbox" id="debugLog" />
    <label for="debugLog">デバッグログを表示する</label>
  </div>

  <button id="saveButton">保存</button>
  <div id="saveMessage"></div>

  <script src="popup.js"></script>
</body>
</html>
